<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <title>Cost Manager Database Test Suite</title>

</head>

  <body>

    <!-- Load the vanilla database implementation for testing -->
    <script src="vanila_db.js"></script>

    <script>
      /**
       * Test function to validate the database operations.
       * Creates a test database, adds sample expenses, and retrieves a report.
       */
      function testDatabase() {
        try {
          // Initialize the database with a test name and version.
          const databaseObject = db.openCostsDB('costsdb', 1);

          // Test 1: Add first cost item (pizza in USD).
          const result1 = databaseObject.addCost({
            sum: 200,
            currency: 'USD',
            category: 'FOOD',
            description: 'pizza',
          });

          // Test 2: Add second cost item (fuel in USD).
          const result2 = databaseObject.addCost({
            sum: 400,
            currency: 'USD',
            category: 'CAR',
            description: 'fuel',
          });

          // Verify database initialization succeeded.
          if (databaseObject) {
            console.log('✓ Creating database succeeded');
          }

          // Verify first cost item addition succeeded.
          if (result1) {
            console.log('✓ Adding 1st cost item succeeded');
          }

          // Verify second cost item addition succeeded.
          if (result2) {
            console.log('✓ Adding 2nd cost item succeeded');
          }

          // Generate a report for the current month in USD and log the total.
          const report = db.getReport('USD');
          console.log(`✓ Report total: ${report.total.sum}`);
        } catch (exception) {
          // Log any errors encountered during testing.
          console.error('Test failed:', exception.message);
        }
      }

      // Execute the test function when the script loads.
      testDatabase();
    </script>

  </body>

</html>
