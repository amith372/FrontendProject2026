<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8">

  <title>Cost Manager Database Test Suite</title>

</head>

  <body>

    <!-- Load the vanilla database implementation for testing -->
    <script src="vanila_db.js"></script>

    <script>
      /**
       * Test function to validate the database operations.
       */
      function testDatabase() {
        try {
          const databaseObject = db.openCostsDB('costsdb', 1);

          const result1 = databaseObject.addCost({
            sum: 200,
            currency: 'USD',
            category: 'FOOD',
            description: 'pizza',
          });

          const result2 = databaseObject.addCost({
            sum: 400,
            currency: 'USD',
            category: 'CAR',
            description: 'fuel',
          });

          if (databaseObject) {
            console.log('✓ Creating database succeeded');
          }

          if (result1) {
            console.log('✓ Adding 1st cost item succeeded');
          }

          if (result2) {
            console.log('✓ Adding 2nd cost item succeeded');
          }

          const report = db.getReport('USD');
          console.log(`✓ Report total: ${report.total.sum}`);
        } catch (exception) {
          console.error('Test failed:', exception.message);
        }
      }

      // Execute the test function when the script loads.
      testDatabase();
    </script>

  </body>

</html>
